<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IL Models — Newsletter Builder</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0C0C; --bg2:#141414; --card:#1A1A1A; --card2:#222;
  --gold:#C9A96E; --gold2:#E8D5A3; --white:#FFF; --gray:#888; --gray2:#BBB;
  --border:#2A2A2A; --green:#4CAF50; --red:#E53935;
  --radius:10px;
}
html,body{min-height:100%;background:var(--bg);color:var(--white);font-family:'Helvetica Neue',Arial,sans-serif;font-size:14px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:90;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:var(--bg2);border-bottom:1px solid var(--border)}
.logo{font-size:17px;font-weight:800;letter-spacing:3px}
.logo em{color:var(--gold);font-style:normal}
.hdr-right{display:flex;align-items:center;gap:10px}

/* ── STATUS PILL ── */
.pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid var(--border);font-size:11px;color:var(--gray)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gray)}
.dot.green{background:var(--green);box-shadow:0 0 5px var(--green)}
.dot.gold{background:var(--gold);animation:pulse .9s ease-in-out infinite alternate}
.dot.red{background:var(--red)}
@keyframes pulse{from{opacity:1}to{opacity:.2}}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;letter-spacing:.4px;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-outline{background:transparent;color:var(--gray2);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover{background:var(--gold2)}
.btn-gold:disabled{background:var(--border);color:var(--gray);cursor:not-allowed;opacity:.7}
.badge{display:inline-block;background:rgba(0,0,0,.25);border-radius:10px;padding:1px 7px;margin-left:4px;font-size:11px}

/* ── TOOLBAR ── */
.toolbar{position:sticky;top:56px;z-index:89;display:flex;align-items:center;gap:10px;padding:0 20px;height:46px;background:var(--bg2);border-bottom:1px solid var(--border)}
.tabs{display:flex;gap:3px;flex:1;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 13px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:.8px;white-space:nowrap;color:var(--gray);border:1px solid transparent;transition:all .15s}
.tab:hover{color:var(--white)}
.tab.on{color:var(--gold);border-color:var(--gold);background:rgba(201,169,110,.08)}
.tab .n{display:inline-block;margin-left:4px;background:rgba(255,255,255,.06);border-radius:8px;padding:1px 5px;font-size:10px;color:var(--gray)}
.search{background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--white);padding:6px 14px;font-size:12px;width:200px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--gold)}
.search::placeholder{color:var(--gray)}

/* ── LOADING BANNER ── */
.banner{display:none;align-items:center;gap:12px;margin:14px 20px 0;padding:10px 14px;background:rgba(201,169,110,.07);border:1px solid rgba(201,169,110,.25);border-radius:8px;font-size:12px;color:var(--gold2)}
.banner.show{display:flex}
.pbar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}

/* ── GRID ── */
.wrap{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px}

/* ── CARD ── */
.card{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;position:relative}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.5);border-color:#383838}
.card.sel{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 6px 20px rgba(201,169,110,.2)}

.gold-bar{height:3px;background:transparent}
.card.sel .gold-bar{background:var(--gold)}
.card:hover .gold-bar{background:#333}

.photo-wrap{position:relative;width:100%;aspect-ratio:2/3;overflow:hidden;background:var(--card2)}
.photo-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.card:hover .photo-wrap img{transform:scale(1.04)}

.photo-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.card:hover .photo-overlay{opacity:1}
.photo-overlay span{background:rgba(201,169,110,.9);color:#000;padding:7px 13px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px}

.sel-badge{position:absolute;top:8px;right:8px;background:var(--gold);color:#000;width:22px;height:22px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.card.sel .sel-badge{display:flex}

.no-photo{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#333}

.info{padding:9px 11px 11px}
.name{font-size:12px;font-weight:700;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.stats{font-size:9px;color:var(--gray);line-height:1.5;margin-bottom:5px;min-height:13px}
.insta{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--gold);text-decoration:none}
.insta:hover{color:var(--gold2)}

/* Skeletons */
.skel{animation:shim 1.3s ease infinite}
@keyframes shim{0%,100%{background:#1a1a1a}50%{background:#242424}}
.sk-card{border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.sk-photo{aspect-ratio:2/3}
.sk-info{padding:9px 11px;display:flex;flex-direction:column;gap:6px}
.sk-line{height:9px;border-radius:4px}

/* Empty */
.empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--gray)}
.empty h3{font-size:15px;color:var(--gray2);margin-bottom:6px}

/* ── GALLERY MODAL ── */
.backdrop{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto}
.backdrop.open{display:flex}
.modal{width:100%;max-width:860px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;animation:mIn .2s ease;margin:auto 0}
@keyframes mIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.mhdr{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border);background:var(--card)}
.mtitle{font-size:15px;font-weight:700}
.mtitle span{color:var(--gold)}
.msub{font-size:10px;color:var(--gray);margin-top:2px}
.mclose{width:30px;height:30px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.mclose:hover{background:var(--red);color:#fff;border-color:var(--red)}

.mbody{padding:18px 22px}
.loading{text-align:center;padding:50px 20px;color:var(--gray)}
.spin{width:32px;height:32px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--gold);animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.gitem{position:relative;aspect-ratio:2/3;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .15s}
.gitem img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.gitem:hover img{transform:scale(1.04)}
.gitem:hover,.gitem.picked{border-color:var(--gold)}
.gitem.picked::after{content:'✓';position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:var(--gold);color:#000;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.gnum{position:absolute;bottom:3px;right:4px;background:rgba(0,0,0,.6);color:var(--gray);font-size:8px;padding:1px 4px;border-radius:3px}

.mftr{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-top:1px solid var(--border);background:var(--card)}
.mftr-info{font-size:11px;color:var(--gray)}
.mftr-info strong{color:var(--gold2)}
.mbtns{display:flex;gap:8px}

/* ── BOTTOM PANEL ── */
.panel{position:fixed;bottom:0;left:0;right:0;z-index:140;display:none;align-items:center;gap:14px;padding:10px 20px;background:var(--bg2);border-top:1px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.5)}
.panel.on{display:flex}
.pnl-label{font-size:11px;color:var(--gray);white-space:nowrap}
.pnl-label strong{color:var(--gold);font-size:13px}
.pnl-thumbs{display:flex;gap:5px;flex:1;overflow-x:auto}
.pnl-thumbs::-webkit-scrollbar{display:none}
.pnl-thumb{position:relative;flex-shrink:0;width:38px;height:52px;border-radius:5px;overflow:hidden;border:1.5px solid var(--gold)}
.pnl-thumb img{width:100%;height:100%;object-fit:cover}
.pnl-rm{position:absolute;top:1px;right:1px;width:13px;height:13px;border-radius:50%;background:rgba(0,0,0,.8);color:#fff;display:none;align-items:center;justify-content:center;font-size:8px;cursor:pointer;border:none}
.pnl-thumb:hover .pnl-rm{display:flex}
.pnl-actions{display:flex;gap:8px;flex-shrink:0}

/* ── LAYOUT WITH PREVIEW ── */
.app-layout{display:flex;min-height:calc(100vh - 102px)}
.main-content{flex:1;min-width:0;transition:margin-right .3s ease}
.main-content.preview-active{margin-right:0}

/* ── PREVIEW PANEL ── */
.preview-toggle{background:transparent;color:var(--gray2);border:1px solid var(--border);border-radius:7px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.4px}
.preview-toggle:hover{border-color:var(--gold);color:var(--gold)}
.preview-toggle.active{border-color:var(--gold);color:var(--gold);background:rgba(201,169,110,.08)}

.preview-panel{width:0;flex-shrink:0;background:var(--bg2);border-left:1px solid transparent;transition:width .3s ease,border-color .3s ease;overflow:hidden;display:flex;flex-direction:column;position:sticky;top:102px;height:calc(100vh - 102px)}
.preview-panel.open{width:20vw;min-width:220px;max-width:340px;border-left-color:var(--border)}

.prev-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0}
.prev-hdr h3{font-size:11px;font-weight:700;letter-spacing:1px}
.prev-hdr span{font-size:9px;color:var(--gray)}
.prev-close{background:transparent;border:none;color:var(--gray);font-size:14px;cursor:pointer;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
.prev-close:hover{background:var(--red);color:#fff}

.prev-body{flex:1;overflow-y:auto;padding:10px}
.prev-body::-webkit-scrollbar{width:3px}
.prev-body::-webkit-scrollbar-thumb{background:var(--border)}

.prev-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--gray);gap:10px;text-align:center;padding:20px}
.prev-empty svg{opacity:.3}
.prev-empty p{font-size:11px;line-height:1.5}

/* PDF page mockup */
.pdf-page{background:#0A0A0A;border:1px solid #2a2a2a;border-radius:5px;overflow:hidden;margin-bottom:8px}
.pdf-page-hdr{background:#111;border-bottom:1px solid #C9A96E;padding:5px 8px;display:flex;align-items:center;justify-content:space-between}
.pdf-page-hdr .logo-txt{font-size:9px;font-weight:800;letter-spacing:2px;color:#fff}
.pdf-page-hdr .date-txt{font-size:7px;color:#888}
.pdf-page-top-bar{height:2px;background:#C9A96E}

.pdf-cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:6px}

.pdf-card{background:#181818;border:1px solid #2a2a2a;border-radius:4px;overflow:hidden}
.pdf-card-top{height:2px;background:#C9A96E}
.pdf-card-img{aspect-ratio:2/3;width:100%;object-fit:cover;display:block;background:#222}
.pdf-card-info{padding:4px 5px 5px}
.pdf-card-name{font-size:7px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.pdf-card-stats{font-size:5.5px;color:#888;line-height:1.4;margin-bottom:2px;min-height:8px}
.pdf-card-insta{font-size:6px;color:#C9A96E}

.pdf-page-ftr{background:#111;border-top:1px solid #C9A96E;padding:3px 8px;text-align:center}
.pdf-page-ftr span{font-size:6px;color:#888}

/* ── TOASTS ── */
.toasts{position:fixed;top:68px;right:16px;z-index:999;display:flex;flex-direction:column;gap:7px}
.toast{padding:9px 14px;border-radius:8px;font-size:12px;font-weight:500;animation:tin .2s ease;max-width:260px}
.toast.ok{background:#1a3a1a;border:1px solid var(--green);color:#aaffaa}
.toast.err{background:#3a1a1a;border:1px solid var(--red);color:#ffaaaa}
.toast.info{background:rgba(201,169,110,.1);border:1px solid var(--gold);color:var(--gold2)}
@keyframes tin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}

@media(max-width:540px){.grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}; .search{width:150px}}
</style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div style="display:flex;align-items:center;gap:14px">
    <div class="logo">IL<em>.</em>MODELS</div>
    <div class="pill"><div class="dot" id="dot"></div><span id="stxt">Loading…</span></div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-outline" onclick="doRefresh()" id="rfBtn">↺ Refresh</button>
    <button class="preview-toggle" id="prevBtn" onclick="togglePreview()" disabled>
      👁 Preview
    </button>
    <button class="btn btn-gold" id="genBtn" onclick="doPDF()" disabled>
      Generate PDF <span class="badge" id="genN">0</span>
    </button>
  </div>
</header>

<!-- Toolbar -->
<div class="toolbar">
  <div class="tabs" id="tabs"></div>
  <input class="search" type="text" placeholder="Search…" oninput="onSearch(this.value)" id="srch"/>
</div>

<!-- Loading banner -->
<div class="banner" id="banner">
  <span id="bannerTxt">Fetching from ilmodel.com…</span>
  <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
</div>

<!-- Main layout -->
<div class="app-layout">
  <div class="main-content" id="mainContent">
    <div class="wrap"><div class="grid" id="grid"></div></div>
  </div>

  <!-- Preview panel (inline, 20% width) -->
  <div class="preview-panel" id="previewPanel">
    <div class="prev-hdr">
      <div>
        <h3>PDF PREVIEW</h3>
        <span id="prevCount">0 models</span>
      </div>
      <button class="prev-close" onclick="togglePreview()">✕</button>
    </div>
    <div class="prev-body" id="prevBody">
      <div class="prev-empty">
        <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><rect x="8" y="12" width="8" height="6"/></svg>
        <p>Select models<br/>to preview PDF</p>
      </div>
    </div>
  </div>
</div>

<!-- Gallery modal -->
<div class="backdrop" id="backdrop" onclick="bgClick(event)">
  <div class="modal">
    <div class="mhdr">
      <div><div class="mtitle" id="mtitle">Gallery</div><div class="msub" id="msub"></div></div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="mbody"><div class="loading"><div class="spin"></div><p>Loading…</p></div></div>
    <div class="mftr">
      <div class="mftr-info" id="minfo">Click a photo to select it</div>
      <div class="mbtns">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-gold" id="mConfirm" onclick="confirmPick()" disabled>Use this photo</button>
      </div>
    </div>
  </div>
</div>

<!-- Bottom panel -->
<div class="panel" id="panel">
  <div class="pnl-label"><strong id="pnlN">0</strong> selected</div>
  <div class="pnl-thumbs" id="pnlThumbs"></div>
  <div class="pnl-actions">
    <button class="btn btn-outline" onclick="clearAll()">Clear</button>
    <button class="btn btn-gold" onclick="doPDF()">Generate PDF</button>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
// ── State ──────────────────────────────────────────────────────
const CATS = ["WOMEN","MEN","CURVE","NEW FACES","CLASSIC","INFLUENCERS"];
let allData  = {};      // {CAT: [model,...]}
let selected = {};      // {key: {model, photoUrl}}
let cat      = "WOMEN";
let q        = "";
let pollT    = null;

// Gallery
let gModel   = null;
let gPhotos  = [];
let gPicked  = null;

// ── Boot ───────────────────────────────────────────────────────
async function boot() {
  buildTabs();
  showSkel();
  try {
    const r = await fetch("/api/models");
    if (r.ok) {
      const d = await r.json();
      allData = d.data || d;
      refreshTabCounts();
      renderGrid();
      setStatus("green", "Ready · " + fmtDate(d.fetched_at));
    } else {
      showBanner(true, "Fetching data from ilmodel.com…");
      startPoll();
    }
  } catch { setStatus("red","Connection error"); }
}

// ── Tabs ───────────────────────────────────────────────────────
function buildTabs() {
  document.getElementById("tabs").innerHTML = CATS.map(c =>
    `<div class="tab${c===cat?' on':''}" id="t-${c.replace(' ','_')}" onclick="swCat('${c}')">${c}<span class="n" id="n-${c.replace(' ','_')}">…</span></div>`
  ).join("");
}
function refreshTabCounts() {
  CATS.forEach(c => { const el=document.getElementById("n-"+c.replace(' ','_')); if(el) el.textContent=(allData[c]||[]).length; });
}
function swCat(c2) {
  cat=c2; q=""; document.getElementById("srch").value="";
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.getElementById("t-"+c2.replace(' ','_'))?.classList.add("on");
  renderGrid();
}

// ── Grid ───────────────────────────────────────────────────────
function showSkel(n=12) {
  document.getElementById("grid").innerHTML = Array(n).fill(0).map(()=>
    `<div class="sk-card skel"><div class="sk-photo skel"></div><div class="sk-info"><div class="sk-line skel" style="width:65%"></div><div class="sk-line skel" style="width:45%"></div></div></div>`
  ).join("");
}

function renderGrid() {
  const models = (allData[cat]||[]).filter(m => {
    if (!q) return true;
    const s = q.toLowerCase();
    return (m.name||"").toLowerCase().includes(s) || (m.insta||"").toLowerCase().includes(s) || (m.stats||"").toLowerCase().includes(s);
  });
  const g = document.getElementById("grid");
  if (!models.length) {
    g.innerHTML=`<div class="empty"><h3>${q?"No results":"No data yet"}</h3><p>${q?`Nothing for "${q}"`:"Click Refresh to load models"}</p></div>`;
    return;
  }
  g.innerHTML = models.map(m => mkCard(m)).join("");
}

function key(m) { return m.slug||m.name; }

function mkCard(m) {
  const k   = key(m);
  const sel = !!selected[k];
  const img = (selected[k]?.photoUrl)||m.thumb||"";
  const ig  = (m.insta||"").replace("@","");
  return `<div class="card${sel?" sel":""}" id="c-${CSS.escape(k)}" onclick="openGallery('${ej(k)}')">
    <div class="gold-bar"></div>
    <div class="photo-wrap">
      ${img?`<img src="${eh(img)}" loading="lazy" onerror="this.style.display='none'"/>`:`<div class="no-photo"><svg width="28" height="28" fill="none" stroke="#333" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`}
      <div class="photo-overlay"><span>📷 Choose Photo</span></div>
      <div class="sel-badge">✓</div>
    </div>
    <div class="info">
      <div class="name" title="${eh(m.name)}">${eh(m.name)}</div>
      <div class="stats">${eh((m.stats||"").slice(0,55))}</div>
      ${ig?`<a class="insta" href="https://instagram.com/${ig}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>${eh(m.insta)}</a>`:""}
    </div>
  </div>`;
}

function refreshCard(k, photoUrl) {
  const card = document.getElementById("c-"+CSS.escape(k));
  if (!card) return;
  if (selected[k]) {
    card.classList.add("sel");
    if (photoUrl) { const img=card.querySelector(".photo-wrap img"); if(img) img.src=photoUrl; }
  } else card.classList.remove("sel");
}

// ── Gallery modal ──────────────────────────────────────────────
function findModel(k) {
  for (const c of CATS) {
    const m = (allData[c]||[]).find(m=>key(m)===k);
    if (m) return m;
  }
  return null;
}

function openGallery(k) {
  const m = findModel(k);
  if (!m) return;
  gModel  = m;
  gPhotos = m.photos||[];
  gPicked = selected[k]?.photoUrl || m.thumb || null;

  document.getElementById("mtitle").innerHTML = `Gallery — <span>${eh(m.name)}</span>`;
  document.getElementById("msub").textContent = m.url||"";
  document.getElementById("backdrop").classList.add("open");
  document.body.style.overflow="hidden";
  document.getElementById("mConfirm").disabled = !gPicked;

  if (gPhotos.length) renderGal(gPhotos);
  else document.getElementById("mbody").innerHTML=`<div class="loading"><div class="spin"></div><p>Loading photos…</p></div>`;

  // Fetch live photos from server
  if (m.slug) {
    fetch(`/api/model-photos/${encodeURIComponent(m.slug)}`).then(r=>r.json()).then(d=>{
      if (d.photos?.length) { gPhotos=d.photos; renderGal(d.photos); }
    }).catch(()=>{});
  }
}

function renderGal(photos) {
  if (!photos.length) {
    document.getElementById("mbody").innerHTML=`<div class="loading"><p style="color:#666">No photos found</p></div>`;
    return;
  }
  document.getElementById("mbody").innerHTML =
    `<div class="ggrid">${photos.map((u,i)=>`<div class="gitem${gPicked===u?" picked":""}" onclick="pickPhoto('${ej(u)}')" title="Photo ${i+1}"><img src="${eh(u)}" loading="lazy"/><span class="gnum">${i+1}</span></div>`).join("")}</div>`;
  updMInfo();
}

function pickPhoto(url) {
  gPicked = url;
  document.querySelectorAll(".gitem").forEach((el,i)=>{
    el.classList.toggle("picked", gPhotos[i]===url);
  });
  document.getElementById("mConfirm").disabled = false;
  updMInfo();
}

function updMInfo() {
  const el = document.getElementById("minfo");
  if (gPicked) {
    const i = gPhotos.indexOf(gPicked);
    el.innerHTML = `Selected: <strong>Photo ${i+1} of ${gPhotos.length}</strong>`;
  } else el.textContent = `${gPhotos.length} photos — click to select`;
}

function confirmPick() {
  if (!gModel||!gPicked) return;
  const k = key(gModel);
  selected[k] = { model: gModel, photoUrl: gPicked };
  closeModal();
  refreshCard(k, gPicked);
  updatePanel();
  toast(`${gModel.name} added ✓`, "ok");
}

function closeModal() {
  document.getElementById("backdrop").classList.remove("open");
  document.body.style.overflow="";
  gModel=null; gPhotos=[]; gPicked=null;
  document.getElementById("mConfirm").disabled=true;
}
function bgClick(e) { if(e.target===document.getElementById("backdrop")) closeModal(); }

// ── Panel ──────────────────────────────────────────────────────
function updatePanel() {
  const keys = Object.keys(selected);
  document.getElementById("pnlN").textContent  = keys.length;
  document.getElementById("genN").textContent  = keys.length;
  document.getElementById("genBtn").disabled   = !keys.length;
  document.getElementById("prevBtn").disabled  = !keys.length;
  document.getElementById("panel").classList.toggle("on", keys.length>0);
  document.getElementById("pnlThumbs").innerHTML = keys.map(k=>{
    const {model,photoUrl}=selected[k];
    return `<div class="pnl-thumb" title="${eh(model.name)}">
      ${photoUrl?`<img src="${eh(photoUrl)}" alt=""/>`:""}
      <button class="pnl-rm" onclick="rmSelected('${ej(k)}')" title="Remove">✕</button>
    </div>`;
  }).join("");
  updatePreview();
}
function rmSelected(k) { delete selected[k]; refreshCard(k,null); updatePanel(); }
function clearAll()     { Object.keys(selected).forEach(k=>{delete selected[k];refreshCard(k,null);}); updatePanel(); }

// ── Preview ────────────────────────────────────────────────────
let previewOpen = false;

function togglePreview() {
  const keys = Object.keys(selected);
  if (!previewOpen && !keys.length) return;
  previewOpen = !previewOpen;
  document.getElementById("previewPanel").classList.toggle("open", previewOpen);
  document.getElementById("mainContent").classList.toggle("preview-active", previewOpen);
  document.getElementById("prevBtn").classList.toggle("active", previewOpen);
  if (previewOpen) updatePreview();
}

function updatePreview() {
  const keys = Object.keys(selected);
  document.getElementById("prevCount").textContent = keys.length + " model" + (keys.length!==1?"s":"") + " selected";

  if (!keys.length) {
    document.getElementById("prevBody").innerHTML = `<div class="prev-empty">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><rect x="8" y="12" width="8" height="6"/></svg>
      <p>Select models from<br/>the grid to preview<br/>your PDF here</p>
    </div>`;
    return;
  }

  // Build pages (2 per row, 4 rows per page = 8 per page)
  const CARDS_PER_PAGE = 8;
  const all = keys.map(k => selected[k]);
  const pages = [];
  for (let i = 0; i < all.length; i += CARDS_PER_PAGE) pages.push(all.slice(i, i+CARDS_PER_PAGE));
  const now = new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});

  document.getElementById("prevBody").innerHTML = pages.map((page, pi) => `
    <div class="pdf-page">
      <div class="pdf-page-top-bar"></div>
      <div class="pdf-page-hdr">
        <span class="logo-txt">IL<span style="color:#C9A96E">.</span>MODELS</span>
        <span class="date-txt">Newsletter · ${now}</span>
      </div>
      <div class="pdf-cards-grid">
        ${page.map(({model, photoUrl}) => `
          <div class="pdf-card">
            <div class="pdf-card-top"></div>
            ${photoUrl ? `<img class="pdf-card-img" src="${eh(photoUrl)}" loading="lazy"/>` : `<div class="pdf-card-img" style="display:flex;align-items:center;justify-content:center;"><span style="color:#333;font-size:9px">No photo</span></div>`}
            <div class="pdf-card-info">
              <div class="pdf-card-name">${eh(model.name||"")}</div>
              <div class="pdf-card-stats">${eh((model.stats||"").slice(0,50))}</div>
              ${model.insta ? `<div class="pdf-card-insta">${eh(model.insta)}</div>` : ""}
            </div>
          </div>
        `).join("")}
      </div>
      <div class="pdf-page-ftr"><span>Page ${pi+1} of ${pages.length} · ilmodel.com</span></div>
    </div>
  `).join("");
}

// ── PDF ────────────────────────────────────────────────────────
async function doPDF() {
  const keys = Object.keys(selected);
  if (!keys.length) { toast("Select models first","info"); return; }
  const btn = document.getElementById("genBtn");
  btn.textContent="Generating…"; btn.disabled=true;
  try {
    const res = await fetch("/api/generate",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({models:keys.map(k=>({
        name:selected[k].model.name,
        slug:selected[k].model.slug,
        photo_url:selected[k].photoUrl||selected[k].model.thumb||"",
        stats:selected[k].model.stats||"",
        insta:selected[k].model.insta||"",
        url:selected[k].model.url||""
      }))})
    });
    if (!res.ok) { const e=await res.json().catch(()=>{}); throw new Error(e?.error||"Failed"); }
    const blob=await res.blob();
    const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(blob),download:`il-models-${new Date().toISOString().slice(0,10)}.pdf`});
    document.body.appendChild(a); a.click(); a.remove();
    toast(`PDF ready — ${keys.length} models ✓`,"ok");
  } catch(e) { toast(e.message||"Error","err"); }
  finally { btn.innerHTML=`Generate PDF <span class="badge" id="genN">${keys.length}</span>`; btn.disabled=false; }
}

// ── Refresh ────────────────────────────────────────────────────
async function doRefresh() {
  const b=document.getElementById("rfBtn");
  b.textContent="…"; b.disabled=true;
  await fetch("/api/refresh").catch(()=>{});
  showBanner(true,"Fetching fresh data…");
  startPoll();
  setTimeout(()=>{b.textContent="↺ Refresh";b.disabled=false;},2000);
}

function startPoll() {
  if (pollT) clearInterval(pollT);
  pollT = setInterval(async()=>{
    try {
      const s=await(await fetch("/api/status")).json();
      if (s.running) {
        const pct=s.total?Math.round(s.done/s.total*100):0;
        showBanner(true,`Fetching… ${s.done}/${s.total}`);
        document.getElementById("pfill").style.width=pct+"%";
      } else {
        clearInterval(pollT); pollT=null; showBanner(false);
        const r=await fetch("/api/models");
        if(r.ok){const d=await r.json();allData=d.data||d;refreshTabCounts();renderGrid();setStatus("green","Ready · "+fmtDate(d.fetched_at));toast("Data updated ✓","ok");}
      }
    } catch { clearInterval(pollT); pollT=null; }
  },1500);
}

// ── Status / Banner ────────────────────────────────────────────
function setStatus(cls, txt) {
  document.getElementById("dot").className="dot "+cls;
  document.getElementById("stxt").textContent=txt;
}
function showBanner(v,txt){
  const b=document.getElementById("banner");
  b.classList.toggle("show",v);
  if(txt) document.getElementById("bannerTxt").textContent=txt;
  if(!v) document.getElementById("pfill").style.width="0%";
}

// ── Search ─────────────────────────────────────────────────────
function onSearch(v){q=v;renderGrid();}

// ── Toast ──────────────────────────────────────────────────────
function toast(msg,type="info"){
  const c=document.getElementById("toasts");
  const t=document.createElement("div");
  t.className="toast "+type; t.textContent=msg; c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// ── Utils ──────────────────────────────────────────────────────
function eh(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function ej(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function fmtDate(iso){try{return new Date(iso).toLocaleString("en-IL",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});}catch{return iso||"";}}

document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
boot();
</script>
